name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate development environment
        run: python scripts/validate_env.py

      - name: Run offline security audit
        run: python scripts/security_audit.py

      - name: Run test suite
        run: pytest tests/ -q

      - name: Compile application
        run: python -m compileall -q levi bot

      - name: Build container
        run: docker build -t levi:${{ github.sha }} .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
