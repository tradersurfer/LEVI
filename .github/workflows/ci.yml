name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate development environment
        run: python scripts/validate_env.py

      - name: Run offline security audit
        run: python scripts/security_audit.py

      - name: Run test suite
        run: pytest tests/ -q

      - name: Compile application
        run: python -m compileall -q levi bot

      - name: Build container
        run: docker build -t levi:${{ github.sha }} .

      - name: Start container
        run: docker run -d --name levi-ci -p 8000:8000 levi:${{ github.sha }}

      - name: Wait for startup
        run: sleep 5

      - name: Check /health
        run: curl -f http://localhost:8000/health

      - name: Check /ready
        run: curl -f http://localhost:8000/ready

      - name: Verify non-root user
        run: |
          USER=$(docker exec levi-ci whoami)
          echo "Container running as: $USER"
          if [ "$USER" != "levi" ]; then
            echo "FAIL: expected user 'levi', got '$USER'"
            exit 1
          fi

      - name: Verify runtime workspace is empty
        run: |
          if ! docker exec levi-ci test -d /app/workspace; then
            echo "FAIL: expected runtime workspace directory /app/workspace"
            exit 1
          fi
          WORKSPACE_CONTENTS=$(docker exec levi-ci find /app/workspace -mindepth 1 -print -quit)
          if [ -n "$WORKSPACE_CONTENTS" ]; then
            echo "FAIL: fresh image contains runtime workspace data:"
            echo "$WORKSPACE_CONTENTS"
            exit 1
          fi
          echo "Runtime workspace /app/workspace exists and is empty"

      - name: Verify no secrets in image
        run: |
          MATCHES=$(docker run --rm levi:${{ github.sha }} sh -c 'find / -xdev \( -name ".env" -o -name ".git" -o -path "/app/workspace/*" \) 2>/dev/null || true')
          if [ -n "$MATCHES" ]; then
            echo "FAIL: found excluded paths in image:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No excluded paths found in image"

      - name: Cleanup
        if: always()
        run: |
          docker stop levi-ci || true
          docker rm levi-ci || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
