name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate development environment
        run: python scripts/validate_env.py

      - name: Run offline security audit
        run: python scripts/security_audit.py

      - name: Run test suite
        run: pytest tests/ -q

      - name: Compile application
        run: python -m compileall -q levi bot

      - name: Build container
        run: docker build -t levi:${{ github.sha }} .

      - name: Verify container runtime
        run: |
          set -euo pipefail
          cleanup() {
            docker stop levi-ci >/dev/null 2>&1 || true
            docker rm levi-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d --name levi-ci -p 8000:8000 levi:${{ github.sha }}
          for attempt in {1..15}; do
            if curl -fsS http://localhost:8000/health >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 15 ]; then
              echo "FAIL: container did not become healthy"
              docker logs levi-ci
              exit 1
            fi
            sleep 2
          done

          curl -f http://localhost:8000/health
          echo "PASS: /health returned 2xx"

          curl -f http://localhost:8000/ready
          echo "PASS: /ready returned 2xx"

          container_user="$(docker exec levi-ci whoami)"
          test "$container_user" = "levi"
          echo "PASS: container user is levi"

          matches="$(docker run --rm levi:${{ github.sha }} find / -xdev \( -name '.env' -o -name '.git' -o -path '*/workspace/*' \) 2>/dev/null || true)"
          if [ -n "$matches" ]; then
            echo "FAIL: sensitive build-context content found in image"
            echo "$matches"
            exit 1
          fi
          echo "PASS: no .env, .git, or workspace contents found in image"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
