name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests -q
      - run: python scripts/security_audit.py
      - run: docker build -t levi:${{ github.ref_name }} .
      - name: Select reviewed release notes
        run: cp docs/releases/${GITHUB_REF_NAME}.md release-notes.md
      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --prerelease --notes-file release-notes.md
